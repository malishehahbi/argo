<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header id="header">
            <span class="title">Argo by neorw</span>
            <div class="window-controls">
                <button id="clearBtn" title="Clear All">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                </button>
                <button id="pinBtn" title="Always on Top">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path></svg>
                </button>
                <button id="hideBtn" title="Hide to Tray">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"></path></svg>
                </button>
            </div>
        </header>
        
        <main>
            <div class="textarea-wrapper">
                <textarea id="inputArea" placeholder="Paste Arabic text here..."></textarea>
                <button class="expand-btn" data-target="inputArea">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                </button>
            </div>
            
            <div class="textarea-wrapper">
                <textarea id="outputArea" readonly placeholder="Result will appear here..."></textarea>
                <button class="expand-btn" data-target="outputArea">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                </button>
            </div>
        </main>
        
        <footer>
            <div class="footer-left">
                <button id="copyBtn">Copy Result</button>
                <label class="switch">
                    <input type="checkbox" id="watchToggle">
                    <span class="slider"></span>
                    <span class="label-text">Watch Clipboard</span>
                </label>
            </div>
            <div class="hotkey-display" id="hotkeySetting">
                <span id="hotkeyLabel">...</span>
            </div>
        </footer>
    </div>
    
    <!-- Bubble Overlay -->
    <div id="bubbleOverlay" class="bubble-overlay hidden">
        <div class="bubble-content">
            <textarea id="bubbleTextarea"></textarea>
            <button id="closeBubble">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
